<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logging In — PilotRep</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #04080f;
      --white:    #e8eef5;
      --cyan:     #4fc3f7;
      --cyan-dim: #2a8bbf;
      --muted:    #5a7490;
    }
    body {
      background-color: var(--bg);
      color: var(--white);
      font-family: Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, rgba(30,60,120,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 70% 60%, rgba(20,40,80,0.20) 0%, transparent 60%);
    }
    .starfield::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  50%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 48% 88%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 25%, rgba(200,230,255,0.4) 0%, transparent 100%);
    }
    .card {
      position: relative;
      z-index: 1;
      background: rgba(14,26,43,0.9);
      border: 1px solid rgba(79,195,247,0.12);
      border-radius: 6px;
      padding: 52px 60px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .logo .o-ring {
      display: inline-block;
      width: 0.62em;
      height: 0.62em;
      border: 0.13em solid var(--white);
      border-radius: 50%;
      vertical-align: middle;
      margin: 0 0.01em;
      position: relative;
      top: -0.07em;
    }
    .status {
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid rgba(79,195,247,0.15);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="starfield"></div>
  <div class="card">
    <div class="logo">PIL<span class="o-ring"></span>T REP</div>
    <div class="spinner"></div>
    <div class="status" id="status">Authenticating with EVE Online…</div>
  </div>

  <script>
    // Hand the code + state to the Netlify function server-side
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const state  = params.get('state');
    const error  = params.get('error');

    if (error || !code) {
      document.getElementById('status').textContent = 'Login cancelled or failed.';
      setTimeout(() => { window.location.href = '/index.html'; }, 2000);
    } else {
      // Forward to the server-side callback function
      window.location.href =
        `/.netlify/functions/auth-callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state || '')}`;
    }
  </script>
</body>
</html>
